paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user against the database and returns a JWT
      parameters:
      - description: Login Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/backend-sevima_internal_services.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response-backend-sevima_internal_services_LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Common'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Common'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Common'
      summary: User Login
      tags:
      - Authentication
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new tenant and a new admin user within a transaction
      parameters:
      - description: Register Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/backend-sevima_internal_services.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response-backend-sevima_internal_services_RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Common'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Common'
      summary: User Registration
      tags:
      - Authentication
securityDefinitions:
  Bearer:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
